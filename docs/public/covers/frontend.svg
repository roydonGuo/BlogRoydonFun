<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#302b63"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Browser frame -->
  <rect x="100" y="65" width="200" height="130" rx="8" fill="none" stroke="#6C8CFF" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="85" x2="300" y2="85" stroke="#6C8CFF" stroke-width="2" opacity="0.5"/>
  <circle cx="115" cy="77" r="4" fill="#FF6B6B" opacity="0.6"/>
  <circle cx="130" cy="77" r="4" fill="#FFD93D" opacity="0.6"/>
  <circle cx="145" cy="77" r="4" fill="#6BCB77" opacity="0.6"/>
  <!-- HTML tags -->
  <text x="145" y="115" font-size="11" font-family="monospace" fill="#6C8CFF" opacity="0.7">&lt;div&gt;</text>
  <rect x="155" y="125" width="90" height="16" rx="3" fill="#2445EB" opacity="0.3"/>
  <text x="145" y="155" font-size="11" font-family="monospace" fill="#6C8CFF" opacity="0.7">&lt;/div&gt;</text>
  <!-- Curly braces for CSS/JS -->
  <text x="310" y="140" font-size="36" font-family="monospace" font-weight="bold" fill="#2445EB" opacity="0.3">{ }</text>
  <text x="200" y="208" text-anchor="middle" font-size="14" font-family="system-ui" fill="#6C8CFF" opacity="0.8">前端开发</text>
